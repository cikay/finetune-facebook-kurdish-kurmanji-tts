stages:
  - acquire
  - enhancement
  - segmentation

acquire:
  sources:
    - audio:
        strategy: youtube_playlist
        playlist_urls:
          - https://youtube.com/playlist?list=PLpi8IQW8sLlOmmCgJA00ecGLHYMBcS5bu&si=dKWr1h_BJWV_FTTx
      text:
        strategy: web_scrape
        base_url: https://azadyawelat.com/
        endpoint_method: slugify-audio-name
  langid_language: kmr_Latn
  min_lang_confidence: 0.60
  output_dir: dataset/acquire
enhancement:
  tools:
    deepfilternet:
        run_if:
          dns_mos__bak__lte: 3.5
        replace_if:
          enhance__dns_mos__bak__gt: 0      # bak must enhance
          damage__dns_mos__sig__lte: 0.1    # if sig drop grater than 0.1 do not replace
          enhance__dns_mos__ovr__gt: 0       # overall must enhance
  input_dir: dataset/acquire
  output_dir: dataset/enhancement
segmentation:
  input_dir: dataset/enhancement
  output_dir: dataset/segmentation
  align_language: kmr
  min_duration: 2.0
  max_duration: 15.0
  min_words: 3
  min_align_score: -7.0
  end_padding: 0.15
